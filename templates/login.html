<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #0f172a;
    }

    form p {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #2563eb;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <div class="card">
    <h2>Login</h2>

    <form method="post">
      {% csrf_token %}

      {{ form.as_p }}

      <button type="submit">Login</button>
    </form>

    <div class="link">
      Don't have an account?
      <a href="/register/">Register</a>
    </div>
  </div>

</body>
</html>
